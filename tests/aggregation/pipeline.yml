description: "Aggregation Pipeline"

runOn:
  - language: "*"

setup:
  - name: insertMany
    object: collection
    database: harness_test
    collection: agg_test
    arguments:
      documents:
        - { _id: 1, dept: "eng",   salary: 100, level: "junior" }
        - { _id: 2, dept: "eng",   salary: 150, level: "senior" }
        - { _id: 3, dept: "sales", salary: 80,  level: "junior" }
        - { _id: 4, dept: "sales", salary: 120, level: "senior" }
        - { _id: 5, dept: "eng",   salary: 200, level: "lead"   }

teardown:
  - name: dropCollection
    object: database
    database: harness_test
    collection: agg_test

tests:
  - description: "$match stage filters documents"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $match: { dept: "eng" }
        expectResult:
          - { _id: 1, dept: "eng" }
          - { _id: 2, dept: "eng" }
          - { _id: 5, dept: "eng" }

  - description: "$project stage shapes output"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $match: { _id: 1 }
            - $project: { _id: 0, dept: 1, salary: 1 }
        expectResult:
          - { dept: "eng", salary: 100 }

  - description: "$group with $sum accumulator"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $group:
                _id: "$dept"
                totalSalary: { $sum: "$salary" }
            - $sort: { _id: 1 }
        expectResult:
          - { _id: "eng",   totalSalary: 450 }
          - { _id: "sales", totalSalary: 200 }

  - description: "$group with $avg accumulator"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $group:
                _id: "$dept"
                avgSalary: { $avg: "$salary" }
            - $sort: { _id: 1 }
        expectResult:
          - { _id: "eng",   avgSalary: 150 }
          - { _id: "sales", avgSalary: 100 }

  - description: "$group with $count accumulator"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $group:
                _id: "$dept"
                count: { $sum: 1 }
            - $sort: { _id: 1 }
        expectResult:
          - { _id: "eng",   count: 3 }
          - { _id: "sales", count: 2 }

  - description: "$sort stage orders documents"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $sort: { salary: -1 }
            - $project: { _id: 1, salary: 1 }
        expectResult:
          - { _id: 5, salary: 200 }
          - { _id: 2, salary: 150 }
          - { _id: 4, salary: 120 }
          - { _id: 1, salary: 100 }
          - { _id: 3, salary: 80  }

  - description: "$limit stage caps results"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $sort: { _id: 1 }
            - $limit: 2
        expectResult:
          - { _id: 1 }
          - { _id: 2 }

  - description: "$skip stage skips documents"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $sort: { _id: 1 }
            - $skip: 3
            - $project: { _id: 1 }
        expectResult:
          - { _id: 4 }
          - { _id: 5 }

  - description: "$count stage returns document count"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $match: { dept: "eng" }
            - $count: "total"
        expectResult:
          - { total: 3 }

  - description: "$addFields stage adds computed fields"
    operations:
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $match: { _id: 1 }
            - $addFields: { bonus: { $multiply: ["$salary", 0.1] } }
            - $project: { _id: 0, salary: 1, bonus: 1 }
        expectResult:
          - { salary: 100, bonus: 10 }

  - description: "$unwind stage expands array fields"
    operations:
      - name: insertOne
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          document: { _id: 99, tags: ["x", "y"] }
      - name: aggregate
        object: collection
        database: harness_test
        collection: agg_test
        arguments:
          pipeline:
            - $match: { _id: 99 }
            - $unwind: "$tags"
            - $project: { _id: 0, tags: 1 }
        expectResult:
          - { tags: "x" }
          - { tags: "y" }
